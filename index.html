<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChizhEnglish | English Teaching Tools</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* === ГЛОБАЛЬНЫЕ СТИЛИ (как Wildberries) === */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --wb-orange: #ff4000;
      --wb-bg: #f3f3f3;
      --wb-card-bg: #fff;
      --wb-text: #222;
      --wb-gray: #888;
    }
    body {
      font-family: 'Arial', sans-serif;
      background-color: var(--wb-bg);
      color: var(--wb-text);
      line-height: 1.4;
    }

    /* === ХЕДЕР (как у WB) === */
    header {
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 1.5rem;
      max-width: 1600px;
      margin: 0 auto;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--wb-orange);
      text-decoration: none;
    }

    .logo span { color: #222; }

    .search-bar {
      flex: 1;
      max-width: 600px;
      margin: 0 2rem;
      position: relative;
    }

    .search-bar input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.5rem;
      border: 2px solid #e0e0e0;
      border-radius: 4px;
      font-size: 1rem;
    }

    .search-bar i {
      position: absolute;
      left: 0.8rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--wb-gray);
    }

    .cart {
      position: relative;
      font-size: 1.4rem;
      color: var(--wb-orange);
      cursor: pointer;
    }

    .cart-count {
      position: absolute;
      top: -8px;
      right: -8px;
      background: var(--wb-orange);
      color: white;
      font-size: 0.7rem;
      font-weight: bold;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* === ФИЛЬТРЫ (как у WB) === */
    .filters {
      background: white;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #eee;
      max-width: 1600px;
      margin: 0 auto;
    }

    .filter-title {
      font-weight: 600;
      margin-right: 1rem;
      color: #333;
    }

    .filter-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .filter-btn {
      padding: 0.4rem 1rem;
      background: #f8f8f8;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--wb-orange);
      color: white;
      border-color: var(--wb-orange);
    }

    /* === СЕТКА ТОВАРОВ === */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      padding: 1.5rem;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* === КАРТОЧКА (стиль WB: компактно, много инфы) === */
    .product-card {
      background: var(--wb-card-bg);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      transition: box-shadow 0.3s;
    }

    .product-card:hover {
      box-shadow: 0 6px 12px rgba(0,0,0,0.12);
    }

    .card-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: #fafafa;
    }

    .card-content {
      padding: 0.8rem;
    }

    .card-category {
      font-size: 0.75rem;
      color: var(--wb-orange);
      font-weight: 600;
      margin-bottom: 0.3rem;
      text-transform: uppercase;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-desc {
      font-size: 0.8rem;
      color: var(--wb-gray);
      margin-bottom: 0.6rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-price {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--wb-orange);
      margin-bottom: 0.6rem;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 0.65rem;
      background: var(--wb-orange);
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #e03800;
    }

    /* === МОДАЛЬНОЕ ОКНО (стилизовано под WB) === */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      width: 90%;
      max-width: 900px;
      border-radius: 12px;
      overflow: hidden;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      padding: 1rem 1.5rem;
      background: #fafafa;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
    }

    .modal-title {
      font-size: 1.4rem;
      font-weight: 700;
    }

    .close-btn {
      background: #eee;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
    }

    .modal-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .modal-images {
      flex: 1;
      background: #fafafa;
      padding: 1rem;
      display: flex;
      flex-direction: column;
    }

    .main-image {
      width: 100%;
      height: 320px;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      margin-bottom: 0.8rem;
      border-radius: 8px;
    }

    .thumbs {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
    }

    .thumb {
      width: 70px;
      height: 70px;
      background-size: cover;
      background-position: center;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      border: 2px solid transparent;
    }

    .thumb.active {
      border-color: var(--wb-orange);
    }

    .modal-info {
      flex: 1;
      padding: 1.5rem;
      overflow-y: auto;
    }

    .modal-price-big {
      font-size: 1.8rem;
      color: var(--wb-orange);
      font-weight: 800;
      margin: 0.5rem 0;
    }

    .modal-desc {
      margin: 1rem 0;
      line-height: 1.6;
    }

    .modal-buy-btn {
      width: 100%;
      padding: 1rem;
      font-size: 1.1rem;
      margin-top: 1rem;
    }

    /* === КОРЗИНА (модальное окно) === */
    .cart-modal {
      display: none;
      position: fixed;
      top: 0;
      right: 0;
      width: 400px;
      height: 100%;
      background: white;
      box-shadow: -4px 0 12px rgba(0,0,0,0.15);
      z-index: 2001;
      transform: translateX(100%);
      transition: transform 0.4s ease;
    }

    .cart-modal.open {
      transform: translateX(0);
    }

    .cart-header {
      padding: 1.2rem;
      background: var(--wb-orange);
      color: white;
      font-size: 1.3rem;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-close {
      background: white;
      color: var(--wb-orange);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .cart-items {
      padding: 1rem;
      max-height: calc(100% - 150px);
      overflow-y: auto;
    }

    .cart-item {
      display: flex;
      gap: 1rem;
      padding: 1rem 0;
      border-bottom: 1px solid #eee;
    }

    .cart-img {
      width: 60px;
      height: 60px;
      background-size: cover;
      background-position: center;
      border-radius: 4px;
    }

    .cart-info {
      flex: 1;
    }

    .cart-title {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .cart-price {
      color: var(--wb-orange);
      font-weight: 700;
    }

    .remove-btn {
      color: #e74c3c;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
    }

    .cart-total {
      padding: 1rem 1.5rem;
      font-size: 1.2rem;
      font-weight: 700;
      border-top: 2px solid #eee;
    }

    .checkout-btn {
      display: block;
      width: calc(100% - 2rem);
      margin: 0 auto 1rem;
      padding: 1rem;
      background: var(--wb-orange);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1.1rem;
      font-weight: 600;
    }

    /* Адаптив */
    @media (max-width: 768px) {
      .top-bar { flex-wrap: wrap; }
      .search-bar { order: 3; width: 100%; margin: 1rem 0 0; }
      .cart { order: 2; margin-left: auto; }
      .products-grid { grid-template-columns: repeat(2, 1fr); }
      .modal-body { flex-direction: column; }
      .cart-modal { width: 100%; }
    }

    @media (max-width: 480px) {
      .products-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- === ХЕДЕР === -->
  <header>
    <div class="top-bar">
      <a href="#" class="logo">Chizh<span>English</span></a>
      
      <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Search for flashcards, lesson plans...">
      </div>

      <div class="cart" id="cartIcon">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-count" id="cartCount">0</span>
      </div>
    </div>

    <!-- === ФИЛЬТРЫ === -->
    <div class="filters">
      <span class="filter-title">Category:</span>
      <div class="filter-list" id="filterList">
        <button class="filter-btn active" data-category="all">All</button>
        <button class="filter-btn" data-category="flashcards">Flashcards</button>
        <button class="filter-btn" data-category="lessons">Lesson Plans</button>
        <button class="filter-btn" data-category="games">Games</button>
        <button class="filter-btn" data-category="worksheets">Worksheets</button>
      </div>
    </div>
  </header>

  <!-- === ТОВАРЫ === -->
  <div class="products-grid" id="productsGrid">
    <!-- Товары будут вставлены через JS -->
  </div>

  <!-- === МОДАЛЬНОЕ ОКНО ТОВАРА === -->
  <div class="modal" id="productModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Product Title</h2>
        <button class="close-btn" id="closeModal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="modal-images">
          <div class="main-image" id="mainImage"></div>
          <div class="thumbs" id="thumbsContainer"></div>
        </div>
        <div class="modal-info">
          <div class="modal-price-big" id="modalPriceBig">$0.00</div>
          <p class="modal-desc" id="modalDesc">Description...</p>
          <button class="btn modal-buy-btn" id="modalBuyBtn">🛒 Add to Cart</button>
        </div>
      </div>
    </div>
  </div>

  <!-- === КОРЗИНА (боковая панель) === -->
  <div class="cart-modal" id="cartModal">
    <div class="cart-header">
      🛒 Your Cart
      <button class="cart-close" id="closeCartModal">&times;</button>
    </div>
    <div class="cart-items" id="cartItems">
      <!-- Товары корзины -->
    </div>
    <div class="cart-total">
      Total: <span id="cartTotal">$0.00</span>
    </div>
    <button class="checkout-btn" id="checkoutBtn">💳 Proceed to Checkout</button>
  </div>

  <script>
    // === ДАННЫЕ ТОВАРОВ (с вашими картинками!) ===
    const products = [
      {
        id: 1,
        title: "A2 Vocabulary Flashcards",
        category: "flashcards",
        price: 12.99,
        img: "https://i.postimg.cc/fbnzJZNb/1764191757.png",
        images: [
          "https://i.postimg.cc/fbnzJZNb/1764191757.png",
          "https://via.placeholder.com/800x600/f39c12/fff?text=Food+Set",
          "https://via.placeholder.com/800x600/d35400/fff?text=Travel+Set"
        ],
        desc: "200+ printable flashcards for A2 learners. Topics: food, travel, family, work. PDF + PNG + Canva template."
      },
      {
        id: 2,
        title: "5 Ready-Made Lesson Plans",
        category: "lessons",
        price: 19.99,
        img: "https://i.postimg.cc/c4051b2H/1764192331.png",
        images: [
          "https://i.postimg.cc/c4051b2H/1764192331.png",
          "https://via.placeholder.com/800x600/2980b9/fff?text=Worksheet",
          "https://via.placeholder.com/800x600/1abc9c/333?text=Slide"
        ],
        desc: "Time-saving lesson plans (A2–B1). Includes warm-ups, speaking tasks, listening scripts, homework. Editable Google Docs + PDF."
      },
      {
        id: 3,
        title: "Tense Detective Board Game",
        category: "games",
        price: 8.50,
        img: "https://i.postimg.cc/VkTRtGG5/1764192455.png",
        images: [
          "https://i.postimg.cc/VkTRtGG5/1764192455.png",
          "https://via.placeholder.com/800x600/c0392b/fff?text=Board",
          "https://via.placeholder.com/800x600/e67e22/333?text=Cards"
        ],
        desc: "Print-and-play grammar game for 12 tenses. For pairs or small groups. Includes board, 96 clue cards, rules, answer key."
      },
      {
        id: 4,
        title: "Speaking Club Prompts (B1)",
        category: "worksheets",
        price: 9.99,
        img: "https://i.postimg.cc/9M2yPvyk/1764192552.png",
        images: [
          "https://i.postimg.cc/9M2yPvyk/1764192552.png",
          "https://via.placeholder.com/800x600/8e44ad/fff?text=Topic+1",
          "https://via.placeholder.com/800x600/7d3c98/fff?text=Topic+2"
        ],
        desc: "50 discussion prompts for adult learners. Themes: tech, society, future, personal growth. With vocabulary support & follow-up questions."
      },
      {
        id: 5,
        title: "Phrasal Verb Bingo",
        category: "games",
        price: 6.50,
        img: "https://i.postimg.cc/265SfGYc/1764192752.png",
        images: [
          "https://i.postimg.cc/265SfGYc/1764192752.png",
          "https://via.placeholder.com/800x600/219653/fff?text=Caller+Sheet"
        ],
        desc: "Fun bingo game to practise 60 common phrasal verbs. 30 unique cards + caller sheets + definitions. Great for review!"
      },
      {
        id: 6,
        title: "Error Correction Worksheets",
        category: "worksheets",
        price: 7.99,
        img: "https://i.postimg.cc/265SfGYc/1764192752.png", // можно заменить на другую, если есть
        images: [
          "https://i.postimg.cc/265SfGYc/1764192752.png",
          "https://via.placeholder.com/800x600/e67e22/fff?text=Key"
        ],
        desc: "15 worksheets focusing on typical A2–B1 errors: articles, prepositions, word order, tense misuse. With answer keys."
      }
    ];

    // === КОРЗИНА ===
    let cart = [];

    // DOM
    const productsGrid = document.getElementById('productsGrid');
    const filterList = document.getElementById('filterList');
    const cartIcon = document.getElementById('cartIcon');
    const cartModal = document.getElementById('cartModal');
    const cartItemsEl = document.getElementById('cartItems');
    const cartCountEl = document.getElementById('cartCount');
    const cartTotalEl = document.getElementById('cartTotal');
    const closeModalBtn = document.getElementById('closeModal');
    const closeCartModalBtn = document.getElementById('closeCartModal');
    const productModal = document.getElementById('productModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalPriceBig = document.getElementById('modalPriceBig');
    const modalDesc = document.getElementById('modalDesc');
    const mainImage = document.getElementById('mainImage');
    const thumbsContainer = document.getElementById('thumbsContainer');
    const modalBuyBtn = document.getElementById('modalBuyBtn');
    const checkoutBtn = document.getElementById('checkoutBtn');

    // === РЕНДЕР ТОВАРОВ ===
    function renderProducts(category = 'all') {
      productsGrid.innerHTML = '';
      const filtered = category === 'all' 
        ? products 
        : products.filter(p => p.category === category);

      filtered.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <img src="${p.img}" alt="${p.title}" class="card-img">
          <div class="card-content">
            <div class="card-category">${p.category}</div>
            <h3 class="card-title">${p.title}</h3>
            <p class="card-desc">${p.desc}</p>
            <div class="card-price">$${p.price.toFixed(2)}</div>
            <button class="btn open-modal-btn" data-id="${p.id}">🛒 Buy</button>
          </div>
        `;
        productsGrid.appendChild(card);
      });

      // Вешаем обработчики на кнопки
      document.querySelectorAll('.open-modal-btn').forEach(btn => {
        btn.addEventListener('click', () => openModal(parseInt(btn.dataset.id)));
      });
    }

    // === ФИЛЬТРАЦИЯ ===
    filterList.addEventListener('click', (e) => {
      if (e.target.classList.contains('filter-btn')) {
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');
        const category = e.target.dataset.category;
        renderProducts(category);
      }
    });

    // === МОДАЛЬНОЕ ОКНО ===
    let currentProduct = null;

    function openModal(productId) {
      currentProduct = products.find(p => p.id === productId);
      if (!currentProduct) return;

      modalTitle.textContent = currentProduct.title;
      modalPriceBig.textContent = `$${currentProduct.price.toFixed(2)}`;
      modalDesc.textContent = currentProduct.desc;

      // Основное изображение
      mainImage.style.backgroundImage = `url('${currentProduct.images[0]}')`;

      // Миниатюры
      thumbsContainer.innerHTML = '';
      currentProduct.images.forEach((img, i) => {
        const thumb = document.createElement('div');
        thumb.className = 'thumb';
        thumb.style.backgroundImage = `url('${img}')`;
        if (i === 0) thumb.classList.add('active');
        thumb.addEventListener('click', () => {
          mainImage.style.backgroundImage = `url('${img}')`;
          document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
          thumb.classList.add('active');
        });
        thumbsContainer.appendChild(thumb);
      });

      productModal.style.display = 'flex';
    }

    closeModalBtn.addEventListener('click', () => {
      productModal.style.display = 'none';
    });

    window.addEventListener('click', (e) => {
      if (e.target === productModal) {
        productModal.style.display = 'none';
      }
    });

    // === КОРЗИНА ===
    modalBuyBtn.addEventListener('click', () => {
      if (!currentProduct) return;
      addToCart(currentProduct);
      productModal.style.display = 'none';
    });

    function addToCart(product) {
      const existing = cart.find(item => item.id === product.id);
      if (existing) {
        existing.quantity += 1;
      } else {
        cart.push({ ...product, quantity: 1 });
      }
      updateCart();
    }

    function removeFromCart(productId) {
      cart = cart.filter(item => item.id !== productId);
      updateCart();
    }

    function updateCart() {
      // Счётчик
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
      cartCountEl.textContent = totalItems;
      
      // Содержимое корзины
      cartItemsEl.innerHTML = cart.length === 0 
        ? '<p style="text-align:center;padding:2rem;color:#888">Your cart is empty 😢</p>'
        : cart.map(item => `
          <div class="cart-item">
            <div class="cart-img" style="background-image:url('${item.img}')"></div>
            <div class="cart-info">
              <div class="cart-title">${item.title}</div>
              <div class="cart-price">$${item.price.toFixed(2)} × ${item.quantity}</div>
            </div>
            <button class="remove-btn" data-id="${item.id}">×</button>
          </div>
        `).join('');

      // Общая сумма
      const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      cartTotalEl.textContent = `$${total.toFixed(2)}`;

      // Обработчики удаления
      document.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          removeFromCart(parseInt(btn.dataset.id));
        });
      });
    }

    // Открытие/закрытие корзины
    cartIcon.addEventListener('click', () => {
      cartModal.classList.add('open');
    });

    closeCartModalBtn.addEventListener('click', () => {
      cartModal.classList.remove('open');
    });

    // Оформление заказа
    checkoutBtn.addEventListener('click', () => {
      if (cart.length === 0) {
        alert('🛒 Your cart is empty!');
        return;
      }
      const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      alert(`✅ Order placed!\nTotal: $${total.toFixed(2)}\n\n→ Redirect to PayPal / Stripe / Telegram (@ChizhEnglish)`);
      // Пример: window.location.href = 'https://t.me/ChizhEnglish?start=checkout';
    });

    // === ИНИЦИАЛИЗАЦИЯ ===
    renderProducts('all');
  </script>

</body>
</html>
